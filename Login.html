<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - PDPB KPU Kabupaten Jombang</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{

height:100vh;

background:
linear-gradient(rgba(3,18,44,.92),rgba(3,18,44,.92)),
url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1600&q=80");

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

}

.login-box{

width:420px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

padding:40px;

border-radius:20px;

box-shadow:0 0 30px rgba(0,255,255,.25);

color:white;

animation:fade 1s;

}

.login-box h2{

text-align:center;

margin-bottom:10px;

}

.login-box p{

text-align:center;

margin-bottom:30px;

color:#ddd;

}

.form-control{

height:50px;

border-radius:10px;

}

.btn-login{

height:50px;

width:100%;

background:#00BCD4;

border:none;

font-weight:bold;

color:white;

border-radius:10px;

transition:.3s;

}

.btn-login:hover{

background:#00E5FF;

color:black;

}

.footer{

margin-top:20px;

text-align:center;

font-size:13px;

color:#ccc;

}

.alert{

display:none;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="login-box">

<h2>

<i class="fa-solid fa-user-shield"></i>

LOGIN SISTEM

</h2>

<p>

Dashboard PDPB Kabupaten Jombang

</p>

<div class="alert alert-danger" id="pesan">

Username atau Password salah.

</div>

<div class="mb-3">

<label>Username</label>

<input
type="text"
id="username"
class="form-control"
placeholder="Masukkan Username">

</div>

<div class="mb-4">

<label>Password</label>

<input
type="password"
id="password"
class="form-control"
placeholder="Masukkan Password">

</div>

<button class="btn-login" onclick="login()">

<i class="fa-solid fa-right-to-bracket"></i>

LOGIN

</button>

<div class="footer">

© 2026 PDPB Kabupaten Jombang

</div>

</div>

<script>

function login(){

let user=document.getElementById("username").value;

let pass=document.getElementById("password").value;

if(user==="admin" && pass==="12345"){

sessionStorage.setItem("login","true");

sessionStorage.setItem("nama","Administrator");

window.location="dashboard.html";

}

else{

document.getElementById("pesan").style.display="block";

}

}

if(sessionStorage.getItem("login")=="true"){

window.location="dashboard.html";

}

</script>

</body>

</html>
